version: '3.8'

services:
  # Lớp Dữ liệu (DB)
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password123

  # Lớp Xử lý (BE)
  backend:
    build: ./backend
    depends_on:
      - db

  # Lớp Lá chắn & Front-end (Nginx)
  web:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend